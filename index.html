<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <script>!function(){var d=document.documentElement;var t=localStorage.getItem('yuki-theme');var m=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';var c=d.classList.contains('contact-document');function s(){var w=window.innerWidth;d.style.setProperty('--viewport-width',w+'px');d.style.setProperty('--scrollbar-width',c?'0px':Math.max(0,w-d.clientWidth)+'px');d.style.setProperty('--page-frame-space',Math.min(24,Math.max(8,w*.0222))+'px')}d.setAttribute('data-theme',t||m);if(!c){d.style.overflowY='scroll'}s();if(!c){d.style.removeProperty('overflow-y')}window.addEventListener('resize',s)}();</script>
    <title>Yuki | portfolio</title>
    <meta name="author" content="内山 倖徳">
    <meta name="description" content="Web制作を中心に学習しているYukiのポートフォリオサイトです。これまでの制作実績やスキル、自己紹介などを掲載しています。">
    <meta name="keywords" content="portfolio, ポートフォリオ, PORTFOLIO">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no,email=no,address=no">
        <!-- 「正式なURL」を検索エンジンに伝える -->
    <link rel="canonical" href="https://uiharuyuki.github.io/-Yuki-portfolio/">
        <!-- ブラウザのタブやブックマークに出る小さいアイコン -->
    <link rel="icon" href="assets/images/icons/favicon.svg" type="image/svg+xml">
        <!-- iPhone/iPadで「ホーム画面に追加」したときのアイコン -->

    <!-- OGP -->
        <!-- SNS上で認識させるページURL -->
    <meta property="og:url" content="https://uiharuyuki.github.io/-Yuki-portfolio/">
        <!-- ページの種類 -->
    <meta property="og:type" content="website">
        <!-- SNSカードに出るタイトル -->
    <meta property="og:title" content="Yuki | portfolio">
        <!-- SNSカードに出る説明文 -->
    <meta property="og:description" content="Web制作を中心に学習しているYukiのポートフォリオサイトです。これまでの制作実績やスキル、自己紹介などを掲載しています。">
        <!-- サイト全体の名前 -->
    <meta property="og:site_name" content="Yuki Portfolio">
        <!-- SNSカードに表示する画像、絶対URLで指定する。推奨は1200×630px -->
    <meta property="og:image" content="https://uiharuyuki.github.io/-Yuki-portfolio/assets/images/og/portfolio-og.jpg">
        <!-- ページの言語・地域 -->
    <meta property="og:locale" content="ja_JP">

    <!-- OGP X (Twitter) -->
        <!-- Xで大きい画像カードとして表示したい指定 -->
    <meta name="twitter:card" content="summary_large_image">
        <!-- サイト所有者のXアカウント -->
    <meta name="twitter:site" content="@U_K_0211">
        <!-- ページ作成者・記事作成者のXアカウント -->
    <meta name="twitter:creator" content="@U_K_0211">
        <!-- Xカード用タイトル -->
    <meta name="twitter:title" content="Yuki | portfolio">
        <!-- Xカード用説明文 -->
    <meta name="twitter:description" content="Web制作を中心に学習しているYukiのポートフォリオサイトです。これまでの制作実績やスキル、自己紹介などを掲載しています。">
        <!-- Xカード用画像、絶対URLで指定する。推奨は1200×630px -->
    <meta name="twitter:image" content="https://uiharuyuki.github.io/-Yuki-portfolio/assets/images/og/portfolio-og.jpg">

    <!-- Import Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yakuhanjp@4.1.1/dist/css/yakuhanjp.css">

    <!-- Import CSS -->
    <link rel="stylesheet" href="assets/css/kiso.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/component.css">
    <!-- Import CSS home -->
    <link rel="stylesheet" href="assets/css/pages/home.css">
    <script src="assets/js/header.js" defer></script>
    <script src="assets/js/loading.js" defer></script>
    <script src="assets/js/works-data.js" defer></script>
    <script src="assets/js/works-renderer.js" defer></script>
    <script src="assets/js/about-data.js" defer></script>
    <script src="assets/js/about-renderer.js" defer></script>
</head>

<body>
    <div id="loading-overlay" aria-hidden="true">
        <span class="loading-ring" aria-hidden="true"></span>
        <p>Yuki portfolio</p>
    </div>
    <div class="page-frame-blur" aria-hidden="true"></div>
    <div class="page-frame" aria-hidden="true"></div>

    <div id="page-layout__wrapper">
        <site-header current-page="home"></site-header>

        <main>
            <h1 class="visually-hidden">Yuki portfolio</h1>

            <section class="first-view" role="img" aria-label="Yuki portfolio main visual"></section>

            <section class="works-section" aria-labelledby="works-title">
                <div class="container works-container">
                    <h2 id="works-title">WORKS</h2>

                    <div class="works-list" data-works-list data-image-prefix="assets/images/works/" data-detail-prefix="works/"></div>

                    <a href="works/" class="works-more">すべて見る</a>
                </div>
            </section>

            <section class="about-section" aria-labelledby="about-title">
                <div class="container">
                    <h2 id="about-title">ABOUT</h2>

                    <div class="about-inner" data-about-profile data-image-prefix="assets/images/about/">
                        <div class="about-image" data-about-image></div>

                        <div class="about-content">
                            <h3 data-about-name></h3>
                            <p data-about-body></p>
                            <a href="about.html" class="works-detail">詳細<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></a>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <site-footer current-page="home"></site-footer>
    </div>

</body>
</html>
